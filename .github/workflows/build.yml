name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Accept Android SDK Licenses
      run: |
        yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Prepare Web Assets & Install Dependencies
      run: |
        mkdir www
        cp index.html www/index.html
        npm init -y
        npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6

    - name: Create Capacitor Config File
      run: |
        cat <<EOF > capacitor.config.json
        {
          "appId": "com.kiselev.aresblooknote",
          "appName": "ARES BLOOK NOTE",
          "webDir": "www"
        }
        EOF

    - name: Add Android Platform
      run: npx cap add android

    - name: Fix Gradle Permissions
      run: chmod +x android/gradlew

    - name: Compile APK (Debug)
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: ares-blook-note-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
